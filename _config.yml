# ===============================
# BASIC SITE SETTINGS
# ===============================

locale: "en-US"
title: "Dr Chinmaya Nayak"
description: "Academic homepage of Dr Chinmaya Nayak"

url: "https://physics642.github.io"
baseurl: "/Chinmaya.Nayak"   # REQUIRED for project site
repository: "physics642/Chinmaya.Nayak"

# ===============================
# AUTHOR PROFILE
# ===============================

author:
  name: "Dr Chinmaya Nayak"
  avatar: "profile.png"   
  bio: "Associate Professor | Indian Institute of Geomagnetism"
  location: "Navi Mumbai, India"
  employer: "Indian Institute of Geomagnetism"
  email: "chinmaya.n@iigm.res.in"
  googlescholar: "https://scholar.google.com/citations?user=l9LdvBgAAAAJ"
  orcid: "https://orcid.org/0000-0002-3067-2313"
  researchgate: "https://www.researchgate.net/profile/Chinmaya-Nayak-3"

# ===============================
# FILE HANDLING
# ===============================

include:
  - _pages
  - images
  - files

exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md

# ===============================
# MARKDOWN & BUILD
# ===============================

markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
timezone: Etc/UTC

# ===============================
# COLLECTIONS
# ===============================

collections:
  publications:
    output: true
    sort_by: 'year'      
    sort_reverse: true   # newest first
  talks:
    output: true
  teaching:
    output: true
  portfolio:
    output: true

# ===============================
# DEFAULTS
# ===============================

defaults:
  # For all pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  # For posts (blog posts, if any)
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  # For publications
  - scope:
      path: ""
      type: publications
    values:
      layout: publication
      author_profile: true
      share: true
      comments: true
      sort_by: date        # ensures publications are sorted by the date field
      sort_reverse: true   # newest first

  # For teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  # For portfolio items
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  # For talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# ===============================
# PLUGINS (GitHub Pages SAFE)
# ===============================

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

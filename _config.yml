# ===============================
# BASIC SITE SETTINGS
# ===============================

locale: "en-US"
title: "Dr Chinmaya Nayak"
title_separator: "-"
description: "Academic homepage of Dr Chinmaya Nayak"
url: "https://physics642.github.io"
baseurl: "/Chinmaya.Nayak"  
repository: "physics642/physics642.github.io"

# ===============================
# AUTHOR PROFILE
# ===============================

author:
  name: "Dr Chinmaya Nayak"
  avatar: "profile.png"   # DO NOT add /images or full URL
  bio: "Associate Professor | Indian Institute of Geomagnetism"
  location: "Navi Mumbai, India"
  employer: "Indian Institute of Geomagnetism"
  email: "chinmaya.n@iigm.res.in"
  googlescholar: "https://scholar.google.com/citations?user=l9LdvBgAAAAJ"
  orcid: "https://orcid.org/0000-0002-3067-2313"
  researchgate: "https://www.researchgate.net/profile/Chinmaya-Nayak-3"

# ===============================
# SITE FEATURES
# ===============================

breadcrumbs: false
read_more: "disabled"
talkmap_link: false
future: true
words_per_minute: 160

# ===============================
# FILE HANDLING
# ===============================

include:
  - _pages
  - files
  - images

exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md

# ===============================
# MARKDOWN & BUILD
# ===============================

markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
timezone: Etc/UTC

# ===============================
# COLLECTIONS
# ===============================

collections:
  publications:
    output: true
  talks:
    output: true
  teaching:
    output: true
  portfolio:
    output: true

# ===============================
# DEFAULTS
# ===============================

defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true

# ===============================
# PLUGINS (GitHub Pages SAFE)
# ===============================

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
